<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermed · Launchpad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-dark:   #1d3d3d;
    --teal-mid:    #2a5555;
    --teal-accent: #3d8080;
    --teal-light:  #5ba8a8;
    --teal-pale:   #e6f4f4;
    --cream:       #f5f2ed;
    --cream-dark:  #ede9e2;
    --text-main:   #1a2e2e;
    --text-muted:  #6b8282;
    --text-light:  #a0b8b8;
    --red-accent:  #c0392b;
    --white:       #ffffff;
    --shadow-sm:   0 1px 3px rgba(29,61,61,0.08);
    --shadow-md:   0 4px 16px rgba(29,61,61,0.12);
    --shadow-lg:   0 8px 32px rgba(29,61,61,0.16);
    --radius:      10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--teal-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 26px; height: 26px;
    background: var(--teal-light);
    border-radius: 6px;
    display: grid;
    place-items: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--teal-light);
    font-weight: 400;
  }

  .header-meta {
    font-size: 12px;
    color: var(--teal-light);
    font-family: 'DM Mono', monospace;
  }

  /* ── Page Layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }

  .page-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .page-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    margin-top: 40px;
  }

  /* ── Add Card Button ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
    margin-bottom: 0;
  }



  /* ── Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    margin-top: 20px;
  }

  /* ── App Card ── */
  .app-card {
    background: var(--white);
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius);
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 0;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    position: relative;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.18s;
    overflow: hidden;
  }

  .app-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--teal-light));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.22s ease;
  }

  .app-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--teal-light);
    transform: translateY(-2px);
  }

  .app-card:hover::before { transform: scaleX(1); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-icon {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: var(--card-icon-bg, var(--teal-pale));
    display: grid;
    place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }



  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 16px;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--cream-dark);
  }

  .card-url {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .card-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--card-tag-bg, var(--teal-pale));
    color: var(--card-tag-color, var(--teal-accent));
    flex-shrink: 0;
  }

  /* ── Empty State ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }



  /* ── Search ── */
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
  }
  .search-input {
    padding: 9px 12px 9px 34px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-main);
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--teal-light); }

  /* ── Stats Strip ── */
  .stats-strip {
    display: flex;
    gap: 28px;
    margin-top: 28px;
    padding: 16px 22px;
    background: var(--white);
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius);
  }

  .stat-item { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--teal-dark); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .stat-divider {
    width: 1px;
    background: var(--cream-dark);
    align-self: stretch;
  }

</style>
</head>
<body>

<!-- Header -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">+</div>
    <div>
      <div class="logo-text">Intermed <span style="font-weight:300;opacity:0.7">Launchpad</span></div>
    </div>
  </a>
  <div class="header-meta" id="clock"></div>
</header>

<!-- Main -->
<main>
  <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;">
    <div>
      <h1 class="page-title">Internal Tools</h1>
      <p class="page-sub">Quick access to all local services &amp; dashboards</p>
    </div>
    <div class="stats-strip">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Apps</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="stat-cats">0</div>
        <div class="stat-label">Categories</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search apps…" oninput="renderCards()">
    </div>

  </div>

  <div class="section-label" id="grid-label">All Apps</div>
  <div class="cards-grid" id="cardsGrid"></div>
</main>



<script>
  // ── Data ──────────────────────────────────────────────────────────
  const PALETTE = [
    { accent: '#3d8080', iconBg: '#e6f4f4', tagBg: '#e6f4f4', tagColor: '#2a6060' },
    { accent: '#4a7c59', iconBg: '#e8f5ed', tagBg: '#e8f5ed', tagColor: '#2e5c38' },
    { accent: '#6b5ea8', iconBg: '#eeebf8', tagBg: '#eeebf8', tagColor: '#4e4080' },
    { accent: '#b07a30', iconBg: '#fdf3e3', tagBg: '#fdf3e3', tagColor: '#7a5218' },
    { accent: '#c0392b', iconBg: '#fdeaea', tagBg: '#fdeaea', tagColor: '#9b2020' },
    { accent: '#2176ae', iconBg: '#e3f0fb', tagBg: '#e3f0fb', tagColor: '#144f80' },
  ];

  const apps = [
    {
      name: 'HR Dashboard',
      url: '192.168.223.88:3000',
      desc: 'Live workforce overview — headcount, demographics, turnover metrics, and employment breakdown.',
      icon: '👥',
      category: 'HR',
      paletteIdx: 0,
    },
    {
      name: 'Locker',
      url: 'https://locker.intermed.space',
      desc: 'Company locker tracking website. Check availability, reserve a locker, and manage your locker account.',
      icon: '🛅',
      category: 'HR',
      paletteIdx: 0,
    },
    {
      name: 'Survey Dashboard',
      url: 'https://customersurvey.intermed.space',
      desc: 'Interactive survey platform for collecting and analyzing customer feedback.',
      icon: '📄',
      category: 'PA',
      paletteIdx: 0,
    }
  ];

  // ── Clock ─────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
      '  ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Render ────────────────────────────────────────────────────────
  function renderCards() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const grid = document.getElementById('cardsGrid');
    const filtered = apps.filter(a =>
      a.name.toLowerCase().includes(query) ||
      a.category.toLowerCase().includes(query) ||
      a.desc.toLowerCase().includes(query)
    );

    document.getElementById('stat-total').textContent = apps.length;
    const cats = new Set(apps.map(a => a.category).filter(Boolean));
    document.getElementById('stat-cats').textContent = cats.size;
    document.getElementById('grid-label').textContent =
      query ? `Results for "${query}"` : 'All Apps';

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>${query ? 'No apps match your search.' : 'No apps yet — click <strong>Add App</strong> to get started.'}</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(app => {
      const p = PALETTE[app.paletteIdx ?? 0];
      const href = app.url.startsWith('http') ? app.url : 'http://' + app.url;
      return `
      <div class="app-card" style="--card-accent:${p.accent};--card-icon-bg:${p.iconBg};--card-tag-bg:${p.tagBg};--card-tag-color:${p.tagColor};"
           onclick="navigate('${href}')" role="link" tabindex="0">
        <div class="card-header">
          <div class="card-icon">${app.icon || '🌐'}</div>

        </div>
        <div class="card-name">${app.name}</div>
        <div class="card-desc">${app.desc || 'No description provided.'}</div>
        <div class="card-footer">
          <span class="card-url">${app.url}</span>
          ${app.category ? `<span class="card-tag">${app.category}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function navigate(href) {
    window.open(href, '_blank');
  }

  // ── Init ──────────────────────────────────────────────────────────
  renderCards();
</script>
</body>
</html>
